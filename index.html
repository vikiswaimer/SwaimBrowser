<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Swaim Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0b12;
      --panel: #11151f;
      --accent: #4f8cff;
      --text: #f5f7fa;
      --text-muted: #8a94a6;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* Top bar */
    .topbar {
      height: 52px;
      background: rgba(10,11,18,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--accent);
    }

    .logo-icon {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, var(--accent), #7b6aff);
      border-radius: 4px;
    }

    .urlbar {
      flex: 1;
      margin: 0 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      font-size: 13px;
    }

    .urlbar input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .urlbar input::placeholder {
      color: var(--text-muted);
    }

    .nav-buttons {
      display: flex;
      gap: 4px;
    }

    .btn {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.15);
      color: var(--text);
    }

    .btn.active {
      background: var(--accent);
      color: white;
    }

    /* Browser content */
    .browser {
      flex: 1;
      position: relative;
      background: white;
    }

    #webview {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      position: relative;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }

    .tab-content {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    /* Focus mode */
    .focus-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10,11,18,0.98);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 1000;
    }

    .focus-overlay.active {
      display: flex;
    }

    .focus-timer {
      font-size: 48px;
      font-weight: 300;
      font-family: monospace;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .focus-goal {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 400px;
    }

    .blocked-site {
      background: rgba(255,79,106,0.15);
      border: 1px solid rgba(255,79,106,0.3);
      padding: 12px 20px;
      border-radius: 12px;
      margin: 8px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <div class="topbar">
      <div class="logo">
        <div class="logo-icon"></div>
        <span>Swaim</span>
      </div>
      
      <div class="urlbar">
        <span>🔍</span>
        <input id="urlInput" placeholder="Enter URL or search..." />
      </div>
      
      <div class="nav-buttons">
        <button id="backBtn" class="btn" title="Back">←</button>
        <button id="forwardBtn" class="btn" title="Forward">→</button>
        <button id="reloadBtn" class="btn" title="Reload">⟳</button>
        <button id="focusBtn" class="btn" title="Focus Mode">⚡</button>
        <button id="sidebarBtn" class="btn" title="Product Framework">📋</button>
      </div>
    </div>

    <!-- Browser content -->
    <div class="browser">
      <webview id="webview" src="https://swaimapp.com" nodeintegration></webview>
      
      <!-- Focus overlay -->
      <div id="focusOverlay" class="focus-overlay">
        <div class="focus-timer" id="focusTimer">25:00</div>
        <div class="focus-goal" id="focusGoal">Finish customer discovery research</div>
        <div id="blockedSites"></div>
        <button id="endFocusBtn" class="btn" style="margin-top: 30px; padding: 12px 24px; font-size: 16px;">End Session</button>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Swaim Framework</span>
        <button id="closeSidebar" class="btn">✕</button>
      </div>
      
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="focus">Focus</button>
        <button class="tab-btn" data-tab="projects">Projects</button>
        <button class="tab-btn" data-tab="insights">Insights</button>
      </div>
      
      <div class="tab-content">
        <!-- Focus tab -->
        <div id="focusTab" class="tab-pane active">
          <h3>Next Session</h3>
          <select id="sessionDuration">
            <option value="25">25 min</option>
            <option value="50">50 min</option>
            <option value="90">90 min</option>
          </select>
          <input id="sessionGoal" placeholder="Session goal..." />
          <button id="startFocusSession">Start Focus</button>
          
          <div style="margin-top: 20px;">
            <h4>Recent Sessions</h4>
            <div id="recentSessions"></div>
          </div>
        </div>
        
        <!-- Projects tab -->
        <div id="projectsTab" class="tab-pane">
          <h3>Active Project</h3>
          <div id="activeProject"></div>
          <button id="addInsightBtn">Add Insight from Current Page</button>
        </div>
        
        <!-- Insights tab -->
        <div id="insightsTab" class="tab-pane">
          <h3>Recent Insights</h3>
          <div id="insightsList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    const nw = require('nw.gui');
    const Store = require('electron-store');
    const store = new Store();

    // =========================================================================
    // КОНСТАНТЫ
    // Именованные константы вместо магических чисел (Code Complete, гл. 12)
    // =========================================================================
    const CONFIG = Object.freeze({
      DEFAULT_FOCUS_DURATION_MINUTES: 25,
      TIMER_INTERVAL_MS: 1000,
      SECONDS_PER_MINUTE: 60,
      RECENT_INSIGHTS_COUNT: 5,
      DEFAULT_SEARCH_ENGINE: 'https://www.google.com/search?q=',
      DEFAULT_PROTOCOL: 'https://',
      BLOCKED_DOMAINS: Object.freeze([
        'youtube.com',
        'twitter.com',
        'reddit.com',
        'facebook.com',
        'instagram.com'
      ]),
      ICONS: Object.freeze({
        FOCUS_ACTIVE: '⏸️',
        FOCUS_INACTIVE: '⚡'
      }),
      CSS_CLASSES: Object.freeze({
        ACTIVE: 'active',
        OPEN: 'open'
      })
    });

    // =========================================================================
    // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // Утилиты с защитным программированием (Code Complete, гл. 8)
    // =========================================================================

    function getElement(elementId) {
      const element = document.getElementById(elementId);
      if (!element) {
        console.warn(`Element with id "${elementId}" not found`);
      }
      return element;
    }

    function getElements(selector) {
      return document.querySelectorAll(selector);
    }

    function extractDomainFromUrl(url) {
      if (!url || typeof url !== 'string') {
        return '';
      }
      const parts = url.split('/');
      return parts.length > 2 ? parts[2] : '';
    }

    function formatTimeDisplay(totalSeconds) {
      const minutes = Math.floor(totalSeconds / CONFIG.SECONDS_PER_MINUTE);
      const seconds = totalSeconds % CONFIG.SECONDS_PER_MINUTE;
      const paddedSeconds = seconds.toString().padStart(2, '0');
      return `${minutes}:${paddedSeconds}`;
    }

    function normalizeUrl(inputValue) {
      const trimmedInput = inputValue.trim();

      if (!trimmedInput) {
        return null;
      }

      const hasProtocol = trimmedInput.startsWith('http');
      if (hasProtocol) {
        return trimmedInput;
      }

      const looksLikeUrl = trimmedInput.includes('.');
      if (looksLikeUrl) {
        return CONFIG.DEFAULT_PROTOCOL + trimmedInput;
      }

      return CONFIG.DEFAULT_SEARCH_ENGINE + encodeURIComponent(trimmedInput);
    }

    function isBlockedDomain(url) {
      if (!url) {
        return false;
      }
      return CONFIG.BLOCKED_DOMAINS.some(domain => url.includes(domain));
    }

    // =========================================================================
    // КЭШИРОВАНИЕ DOM-ЭЛЕМЕНТОВ
    // Избегаем повторных querySelector (Code Complete, гл. 24 — DRY)
    // =========================================================================
    const DOM = {
      webview: null,
      urlInput: null,
      sidebar: null,
      focusBtn: null,
      focusOverlay: null,
      focusTimer: null,
      focusGoal: null,
      blockedSites: null,
      insightsList: null,

      init() {
        this.webview = getElement('webview');
        this.urlInput = getElement('urlInput');
        this.sidebar = getElement('sidebar');
        this.focusBtn = getElement('focusBtn');
        this.focusOverlay = getElement('focusOverlay');
        this.focusTimer = getElement('focusTimer');
        this.focusGoal = getElement('focusGoal');
        this.blockedSites = getElement('blockedSites');
        this.insightsList = getElement('insightsList');
      }
    };

    // =========================================================================
    // МОДУЛЬ НАВИГАЦИИ
    // Одна ответственность — навигация браузера (Code Complete, гл. 7)
    // =========================================================================
    const NavigationModule = {
      init() {
        this.bindUrlInput();
        this.bindNavigationButtons();
        this.bindUrlSync();
      },

      bindUrlInput() {
        if (!DOM.urlInput || !DOM.webview) return;

        DOM.urlInput.addEventListener('keypress', (event) => {
          if (event.key !== 'Enter') return;

          const normalizedUrl = normalizeUrl(DOM.urlInput.value);
          if (normalizedUrl) {
            DOM.webview.src = normalizedUrl;
          }
        });
      },

      bindNavigationButtons() {
        if (!DOM.webview) return;

        const backBtn = getElement('backBtn');
        const forwardBtn = getElement('forwardBtn');
        const reloadBtn = getElement('reloadBtn');

        if (backBtn) {
          backBtn.addEventListener('click', () => DOM.webview.goBack());
        }
        if (forwardBtn) {
          forwardBtn.addEventListener('click', () => DOM.webview.goForward());
        }
        if (reloadBtn) {
          reloadBtn.addEventListener('click', () => DOM.webview.reload());
        }
      },

      bindUrlSync() {
        if (!DOM.webview || !DOM.urlInput) return;

        DOM.webview.addEventListener('dom-ready', () => {
          DOM.urlInput.value = DOM.webview.src || '';
        });
      }
    };

    // =========================================================================
    // МОДУЛЬ ФОКУСИРОВКИ
    // Инкапсуляция состояния в объект (Code Complete, гл. 10)
    // =========================================================================
    const FocusModule = {
      state: {
        isActive: false,
        timerIntervalId: null,
        remainingSeconds: 0
      },

      init() {
        this.resetTimer();
        this.bindControls();
      },

      resetTimer() {
        const durationMinutes = CONFIG.DEFAULT_FOCUS_DURATION_MINUTES;
        this.state.remainingSeconds = durationMinutes * CONFIG.SECONDS_PER_MINUTE;
      },

      bindControls() {
        if (DOM.focusBtn) {
          DOM.focusBtn.addEventListener('click', () => this.toggle());
        }

        const endFocusBtn = getElement('endFocusBtn');
        if (endFocusBtn) {
          endFocusBtn.addEventListener('click', () => this.stop());
        }
      },

      toggle() {
        if (this.state.isActive) {
          this.stop();
        } else {
          this.start();
        }
      },

      start() {
        this.state.isActive = true;
        this.activateOverlay();
        this.updateButtonState(true);
        this.startBlockingNavigation();
        this.startTimer();
      },

      stop() {
        this.state.isActive = false;
        this.deactivateOverlay();
        this.updateButtonState(false);
        this.stopBlockingNavigation();
        this.stopTimer();
        this.resetTimer();
      },

      activateOverlay() {
        if (DOM.focusOverlay) {
          DOM.focusOverlay.classList.add(CONFIG.CSS_CLASSES.ACTIVE);
        }
      },

      deactivateOverlay() {
        if (DOM.focusOverlay) {
          DOM.focusOverlay.classList.remove(CONFIG.CSS_CLASSES.ACTIVE);
        }
      },

      updateButtonState(isActive) {
        if (!DOM.focusBtn) return;

        if (isActive) {
          DOM.focusBtn.classList.add(CONFIG.CSS_CLASSES.ACTIVE);
          DOM.focusBtn.textContent = CONFIG.ICONS.FOCUS_ACTIVE;
        } else {
          DOM.focusBtn.classList.remove(CONFIG.CSS_CLASSES.ACTIVE);
          DOM.focusBtn.textContent = CONFIG.ICONS.FOCUS_INACTIVE;
        }
      },

      startTimer() {
        this.updateTimerDisplay();

        this.state.timerIntervalId = setInterval(() => {
          this.state.remainingSeconds--;
          this.updateTimerDisplay();

          if (this.state.remainingSeconds <= 0) {
            this.stop();
          }
        }, CONFIG.TIMER_INTERVAL_MS);
      },

      stopTimer() {
        if (this.state.timerIntervalId) {
          clearInterval(this.state.timerIntervalId);
          this.state.timerIntervalId = null;
        }
      },

      updateTimerDisplay() {
        if (DOM.focusTimer) {
          DOM.focusTimer.textContent = formatTimeDisplay(this.state.remainingSeconds);
        }
      },

      startBlockingNavigation() {
        if (DOM.webview) {
          DOM.webview.addEventListener('dom-ready', this.handleNavigationBlock);
        }
      },

      stopBlockingNavigation() {
        if (DOM.webview) {
          DOM.webview.removeEventListener('dom-ready', this.handleNavigationBlock);
        }
      },

      handleNavigationBlock() {
        if (!DOM.webview || !DOM.blockedSites) return;

        const currentUrl = DOM.webview.src;
        if (!isBlockedDomain(currentUrl)) return;

        const domain = extractDomainFromUrl(currentUrl);
        DOM.blockedSites.innerHTML = `
          <div class="blocked-site">
            🚫 ${domain} blocked during focus session
          </div>
        `;
      }
    };

    // =========================================================================
    // МОДУЛЬ САЙДБАРА
    // =========================================================================
    const SidebarModule = {
      init() {
        this.bindToggle();
        this.bindTabs();
      },

      bindToggle() {
        const sidebarBtn = getElement('sidebarBtn');
        const closeSidebarBtn = getElement('closeSidebar');

        if (sidebarBtn && DOM.sidebar) {
          sidebarBtn.addEventListener('click', () => this.toggle());
        }

        if (closeSidebarBtn && DOM.sidebar) {
          closeSidebarBtn.addEventListener('click', () => this.close());
        }
      },

      toggle() {
        if (DOM.sidebar) {
          DOM.sidebar.classList.toggle(CONFIG.CSS_CLASSES.OPEN);
        }
      },

      close() {
        if (DOM.sidebar) {
          DOM.sidebar.classList.remove(CONFIG.CSS_CLASSES.OPEN);
        }
      },

      bindTabs() {
        const tabButtons = getElements('.tab-btn');
        const tabPanes = getElements('.tab-pane');

        tabButtons.forEach(tabButton => {
          tabButton.addEventListener('click', (event) => {
            this.deactivateAllTabs(tabButtons, tabPanes);
            this.activateTab(event.target);
          });
        });
      },

      deactivateAllTabs(tabButtons, tabPanes) {
        tabButtons.forEach(button => {
          button.classList.remove(CONFIG.CSS_CLASSES.ACTIVE);
        });
        tabPanes.forEach(pane => {
          pane.classList.remove(CONFIG.CSS_CLASSES.ACTIVE);
        });
      },

      activateTab(tabButton) {
        tabButton.classList.add(CONFIG.CSS_CLASSES.ACTIVE);

        const tabName = tabButton.dataset.tab;
        const tabPane = getElement(tabName + 'Tab');
        if (tabPane) {
          tabPane.classList.add(CONFIG.CSS_CLASSES.ACTIVE);
        }
      }
    };

    // =========================================================================
    // МОДУЛЬ ИНСАЙТОВ
    // =========================================================================
    const InsightsModule = {
      init() {
        this.loadAndDisplay();
      },

      add() {
        if (!DOM.webview) return;

        const currentUrl = DOM.webview.src;
        const insightText = prompt('Insight/Pain/Idea:', '');

        if (!insightText) return;

        const newInsight = this.createInsight(currentUrl, insightText);
        this.saveInsight(newInsight);
        this.loadAndDisplay();
      },

      createInsight(url, text) {
        return {
          url: url,
          text: text,
          timestamp: new Date().toISOString(),
          tags: []
        };
      },

      saveInsight(insight) {
        const existingInsights = store.get('insights', []);
        const updatedInsights = existingInsights.concat(insight);
        store.set('insights', updatedInsights);
      },

      loadAndDisplay() {
        if (!DOM.insightsList) return;

        const allInsights = store.get('insights', []);
        const recentInsights = allInsights.slice(-CONFIG.RECENT_INSIGHTS_COUNT);

        DOM.insightsList.innerHTML = recentInsights
          .map(insight => this.renderInsightItem(insight))
          .join('');
      },

      renderInsightItem(insight) {
        const escapedText = this.escapeHtml(insight.text);
        return `<div style="padding:8px;border-bottom:1px solid var(--border);font-size:12px;">${escapedText}</div>`;
      },

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    };

    // =========================================================================
    // МОДУЛЬ ГОРЯЧИХ КЛАВИШ
    // =========================================================================
    const HotkeysModule = {
      init() {
        document.addEventListener('keydown', (event) => this.handleKeydown(event));
      },

      handleKeydown(event) {
        if (this.isAddInsightHotkey(event)) {
          event.preventDefault();
          InsightsModule.add();
        }

        if (this.isToggleFocusHotkey(event)) {
          event.preventDefault();
          FocusModule.toggle();
        }
      },

      isAddInsightHotkey(event) {
        return event.altKey && event.key === 'p';
      },

      isToggleFocusHotkey(event) {
        return event.ctrlKey && event.shiftKey && event.key === 'F';
      }
    };

    // =========================================================================
    // ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ
    // Единая точка входа (Code Complete, гл. 31)
    // =========================================================================
    function initializeApplication() {
      DOM.init();
      NavigationModule.init();
      FocusModule.init();
      SidebarModule.init();
      InsightsModule.init();
      HotkeysModule.init();
    }

    initializeApplication();
  </script>
</body>
</html>
